<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta
            name="viewport"
            content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>RPG game</title>
</head>
<body>
<div class="wrap">
    <div class="canvas-wrap">
        <canvas id="world" width="600" height="600" tabindex="1">
            Your browser does not support Canvas
        </canvas>
        <h3>Loading...</h3>
        <div class="border">
            <div class="top-left"></div>
            <div class="top"></div>
            <div class="top-right"></div>
            <div class="right"></div>
            <div class="bottom-right"></div>
            <div class="bottom"></div>
            <div class="bottom-left"></div>
            <div class="left"></div>
        </div>

        <div class="start-game" style="display: none;">
            <form id="nameForm" class="start-card">
                <h2 class="start-title">Choose your hero</h2>

                <div class="skin-picker">
                    <button type="button" class="skin-option is-selected" data-skin="girl1" aria-label="Girl 1"></button>
                    <button type="button" class="skin-option" data-skin="girl2" aria-label="Girl 2"></button>
                    <button type="button" class="skin-option" data-skin="girl3" aria-label="Girl 3"></button>
                    <button type="button" class="skin-option" data-skin="boy1" aria-label="Boy 1"></button>
                    <button type="button" class="skin-option" data-skin="boy2" aria-label="Boy 2"></button>
                    <button type="button" class="skin-option" data-skin="boy3" aria-label="Boy 3"></button>
                </div>

                <label class="row start-label" for="name">
                    Put your name
                </label>
                <div class="row">
                    <input class="input" type="text" name="name" id="name" autofocus maxlength="12" placeholder="Hero name">
                </div>
                <div class="row">
                    <button class="btn">
                        START GAME
                    </button>
                </div>
                <p class="warning"></p>
            </form>
        </div>

        <p class="controls-hint">Tap a tile or use arrows / WASD to move</p>
    </div>
    <div class="chat-wrap" data-online style="display: none">
        <div class="chat-header">
            <span class="chat-title">Chat</span>
            <span class="chat-online" aria-label="Players online"></span>
        </div>
        <div class="message"></div>
        <div class="send">
            <form id="form">
                <input type="text" id="input" name="message" placeholder="Type a message…" autocomplete="off">
                <button aria-label="Send message">
                    <span>SEND</span>
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
